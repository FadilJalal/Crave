version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: crave_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crave_backend
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
    depends_on:
      - mongo
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crave_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  restaurant-admin:
    build:
      context: ./restaurant-admin
      dockerfile: Dockerfile
    container_name: crave_restaurant_admin
    ports:
      - "5175:80"
    depends_on:
      - backend
    restart: unless-stopped

  admin-super:
    build:
      context: ./admin-super
      dockerfile: Dockerfile
    container_name: crave_admin_super
    ports:
      - "5174:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
